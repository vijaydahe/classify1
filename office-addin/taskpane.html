<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassifyHub</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    body { font-family: "Segoe UI", system-ui, sans-serif; margin: 0; padding: 16px; color: #0f172a; }
    h1 { font-size: 16px; margin: 0 0 4px; }
    .sub { color: #64748b; font-size: 12px; margin-bottom: 14px; }
    label { font-size: 12px; color: #475569; display: block; margin: 10px 0 4px; }
    select, input { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
    button { width: 100%; margin-top: 14px; padding: 10px; border: none; border-radius: 6px;
             background: #4f46e5; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:hover { background: #4338ca; }
    .badge { display:inline-block; padding:2px 10px; border-radius:999px; color:#fff; font-size:12px; font-weight:700; }
    #status { margin-top: 14px; font-size: 13px; }
    .warn { background:#fef2f2; color:#b91c1c; border:1px solid #fecaca; padding:10px; border-radius:6px; font-size:12.5px; margin-bottom:12px; }
    .ok { color:#15803d; } .err { color:#b91c1c; }
  </style>
</head>
<body>
  <h1>Classify<span style="color:#4f46e5">Hub</span></h1>
  <div class="sub">Stamp this document's classification before sharing.</div>
  <div id="policy-warn"></div>

  <label for="token">ClassifyHub access token</label>
  <input id="token" type="password" placeholder="paste from /app → profile (once)">

  <label for="label">Classification</label>
  <select id="label">
    <option value="Public">Public</option>
    <option value="Internal">Internal</option>
    <option value="Confidential" selected>Confidential</option>
    <option value="Restricted">Restricted</option>
  </select>

  <button onclick="stampNow()">Stamp document</button>
  <div id="status"></div>

  <script src="taskpane.js"></script>
</body>
</html>
